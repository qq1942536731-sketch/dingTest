<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="fragments :: layout('用户管理', ~{::section})">
<section>
    <h1>用户管理</h1>
    <p class="alert success" th:if="${success}" th:text="${success}"></p>
    <p class="alert error" th:if="${error}" th:text="${error}"></p>

    <div class="panel stack-form">
        <form method="get" th:action="@{/users}" class="toolbar-form">
            <label>按用户名/显示名筛选<input type="text" name="keyword" th:value="${keyword}" placeholder="输入用户名关键字" /></label>
            <button type="submit">筛选</button>
        </form>
    </div>

    <div class="grid two-col admin-grid">
        <div class="panel">
            <h2>新增用户</h2>
            <form method="post" th:action="@{/users}" class="stack-form">
                <label>用户名<input type="text" name="username" required /></label>
                <label>密码<input type="password" name="password" required /></label>
                <label>显示名<input type="text" name="displayName" required /></label>
                <label>状态
                    <select name="enabled">
                        <option value="true">启用</option>
                        <option value="false">禁用</option>
                    </select>
                </label>
                <label>角色分配
                    <select name="roleIds" multiple size="6">
                        <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name + ' (' + role.code + ')'}"></option>
                    </select>
                </label>
                <button type="submit">创建用户</button>
            </form>
        </div>

        <div class="panel">
            <div class="panel-header slim-header">
                <div>
                    <h2>用户列表</h2>
                    <p>列表仅展示用户基础信息，点击详情查看用户权限。</p>
                </div>
            </div>
            <table>
                <thead><tr><th>用户名</th><th>显示名</th><th>状态</th><th>角色</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.displayName}"></td>
                    <td><span class="status-pill" th:classappend="${user.enabled} ? ' status-running' : ' status-ended'" th:text="${user.enabled ? '启用' : '禁用'}"></span></td>
                    <td th:text="${#strings.listJoin(user.roles.![name], '、')}"></td>
                    <td>
                        <div class="action-row">
                            <a class="button-link secondary-link" th:href="@{'/users/' + ${user.id}}">详情</a>
                            <button type="button" class="secondary-button" th:attr="onclick=|document.getElementById('user-modal-${user.id}').showModal()|">编辑</button>
                            <form method="post" th:action="@{'/users/' + ${user.id} + '/delete'}">
                                <button type="submit" class="danger-button">删除</button>
                            </form>
                        </div>
                        <dialog class="edit-dialog" th:id="'user-modal-' + ${user.id}">
                            <form method="dialog" class="dialog-close-row"><button type="submit" class="ghost-button">×</button></form>
                            <h3 th:text="'编辑用户：' + ${user.username}"></h3>
                            <form method="post" th:action="@{'/users/' + ${user.id}}" class="stack-form">
                                <label>显示名<input type="text" name="displayName" th:value="${user.displayName}" required /></label>
                                <label>状态
                                    <select name="enabled">
                                        <option value="true" th:selected="${user.enabled}">启用</option>
                                        <option value="false" th:selected="${!user.enabled}">禁用</option>
                                    </select>
                                </label>
                                <label>角色分配
                                    <select name="roleIds" multiple size="6">
                                        <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name + ' / ' + role.code}" th:selected="${user.roles.contains(role)}"></option>
                                    </select>
                                </label>
                                <div class="action-row">
                                    <button type="submit">保存修改</button>
                                    <button type="button" class="ghost-button" th:attr="onclick=|document.getElementById('user-modal-${user.id}').close()|">取消</button>
                                </div>
                            </form>
                        </dialog>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}"><td colspan="5">暂无符合条件的用户</td></tr>
                </tbody>
            </table>
            <div class="pagination" th:if="${userPage.totalPages > 1}">
                <a class="page-link" th:classappend="${!userPage.hasPrevious()} ? ' disabled'" th:href="${userPage.hasPrevious()} ? @{/users(page=${userPage.number - 1}, keyword=${keyword})} : '#'">上一页</a>
                <span class="page-meta" th:text="|第 ${userPage.number + 1} / ${userPage.totalPages} 页，共 ${userPage.totalElements} 条|"></span>
                <a class="page-link" th:classappend="${!userPage.hasNext()} ? ' disabled'" th:href="${userPage.hasNext()} ? @{/users(page=${userPage.number + 1}, keyword=${keyword})} : '#'">下一页</a>
            </div>
        </div>
    </div>
</section>
</html>
