<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>登录</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body class="login-body">
<div class="login-card">
    <h1>抢券活动管理后台</h1>
    <form method="post" th:action="@{/login}">
        <label>用户名<input type="text" name="username" value="admin" /></label>
        <label>密码<input type="password" name="password" value="password" /></label>
        <button type="submit">登录</button>
    </form>
    <p>示例账号：admin / ops / auditor，默认密码均为 password</p>
    <p th:if="${param.error}" class="error">用户名或密码错误</p>
</div>
</body>
</html>
